logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
jwt.secret=super-secret-key-1234567890-abcdefghijk-extra-chars-for-256bit
jwt.expiration=86400000

JWT_SECRET=super-secret-key-1234567890-abcdefghijk